<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>suhsi.ns</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="index_m.css">
    <link rel="stylesheet" href="suhi_menu.css">
    <link rel="stylesheet" href="sushi_b.css">
    <link rel="stylesheet" href="zakaz.css">
</head>
<body>
    
    <header>

        <button id="menu">
            <div class="lin"></div>
            <div class="lin"></div>
            <div class="lin"></div>
        </button>

        <div id="name_web">
            <h1>Sushi<span>.ns</span></h1>
        </div>

        <button id="basket">
            <div id="count">0</div>
        </button>

        <button id="city">
            <img src="foto/karts_r_2.png" id="city_img">
            <div id="text_city">Місто</div>
        </button>

    </header>

    <main>


        <div id="city_but">
            <button value="м.Київ" class="city_button" id="kiev">
                Київ
            </button>
            <button value="м.Луцьк" class="city_button" id="lck">
                Луцьк
            </button>
            <button value="м.Рівне" class="city_button" id="rivne">
                Рівне
            </button>
            <button value="м.Львів" class="city_button" id="lviv">
                Львів
            </button>
            <button value="м.Одеса" class="city_button" id="odesa">
                Одеса
            </button>
            <button value="м.Дніпро" class="city_button" id="dnipro">
                Дніпро
            </button>
        </div>

        <div id="sushi_menu">

            <div id="text_menu">Меню</div>

            <div id="menu_sushi">
                <button class="menu_item" id="setu">
                    <img src="foto/menu_s/setu.png" class="foto_men">
                    <div class="text_men">Сети</div>
                </button>
                <button class="menu_item"  id="shef">
                    <img src="foto/menu_s/shef.png" class="foto_men">
                    <div class="text_men">Роли від шефа</div>
                </button>
                <button class="menu_item" id="filadelfia">
                    <img src="foto/menu_s/filadelfia.png" class="foto_men">
                    <div class="text_men">Філадельфія</div>
                </button>
                <button class="menu_item" id="drackon">
                    <img src="foto/menu_s/drackon.png" class="foto_men">
                    <div class="text_men">Дракони</div>
                </button>
                <button class="menu_item" id="californya">
                    <img src="foto/menu_s/californya.png" class="foto_men">
                    <div class="text_men">Каліфорнія</div>
                </button>
                <button class="menu_item" id="zapech">
                    <img src="foto/menu_s/zapech.png" class="foto_men">
                    <div class="text_men">Запечені</div>
                </button>
                <button class="menu_item" id="futomaki">
                    <img src="foto/menu_s/futomaki.png" class="foto_men">
                    <div class="text_men">Футомакі</div>
                </button>
                <button class="menu_item" id="maki">
                    <img src="foto/menu_s/maki.png" class="foto_men">
                    <div class="text_men">Макі</div>
                </button>
                <button class="menu_item"  id="nayri">
                    <img src="foto/menu_s/nayri.png" class="foto_men">
                    <div class="text_men">Нагірі</div></button>
                <button class="menu_item"  id="sushi_bur">
                    <img src="foto/menu_s/sushi_bur.png" class="foto_men">
                    <div class="text_men">Суші Бургер</div>
                </button>
                <button class="menu_item"  id="sushi_shaur">
                    <img src="foto/menu_s/sushi_shaur.png" class="foto_men">
                    <div class="text_men">Суші Шаурма</div>
                </button>
                <button class="menu_item"  id="drinck">
                    <img src="foto/menu_s/drinck.png" class="foto_men">
                    <div class="text_men">Напої</div>
                </button>
            </div>
        </div>

        <div id="main_web">


            <div id="main_text">
                <div id="text_h">
                    Смачні роли та <span>суші</span><br>
                    з <span>доставкою</span>
                </div>

                <div id="text_h_1">
                    Замовляйте найсвіжіші суші та роли до свого<br>
                    дому або офісу. Гарантована якість, швидка<br>
                    доставка та вигідні пропозиції!
                </div>

                <div id="gal">
                    <img src="foto/gal.png" style="height: 15px;">
                    Швидка доставка<br>
                    <img src="foto/gal.png" style="height: 15px;">
                    Завжди свіжі інградіенти<br>
                </div>

                <button id="zam">
                    Замовити
                </button>
            </div>

            <div id="menu_div">
                
            </div>
        </div>
        

    </main>

    <footer>

    </footer>

    <script type="module" src="menu_bt.js"></script>
    <script type="module" src="index.js"></script>
    <script type="module" src="b.js"></script>
    <script type="module" src="add_zak.js"></script>
    <script type="module" src="zamfun.js"></script>

</body>
</html>
